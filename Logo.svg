<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .s-path {
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        animation: drawS 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      .s-path:nth-child(1) { animation-delay: 0.2s; } 
      .s-path:nth-child(2) { animation-delay: 0.4s; } 
      .s-path:nth-child(3) { animation-delay: 0.6s; } 
      @keyframes drawS { to { stroke-dashoffset: 0; } }

      .central-core {
        opacity: 0;
        transform-origin: 80px 100px;
        animation: popInCore 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        animation-delay: 2s; 
      }
      @keyframes popInCore {
        0% { opacity: 0; transform: scale(0.3); }
        100% { opacity: 1; transform: scale(1); }
      }

      .central-pulse {
        opacity: 0;
        transform-origin: 80px 100px;
        animation: pulseRing 2.5s infinite cubic-bezier(0.2, 0, 0.2, 1);
        animation-delay: 2.3s; 
      }
      @keyframes pulseRing {
        0% { transform: scale(0.8); opacity: 0; stroke-width: 4; }
        30% { opacity: 0.8; }
        100% { transform: scale(2.5); opacity: 0; stroke-width: 1; }
      }
    </style>

    <filter id="glow-logo" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grad1-logo" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#38BDF8" /> 
        <stop offset="100%" stop-color="#1E2236" />
    </linearGradient>
    <linearGradient id="grad2-logo" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#4F8EF7" /> 
        <stop offset="100%" stop-color="#1E2236" />
    </linearGradient>
    <linearGradient id="grad3-logo" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#A78BFA" /> 
        <stop offset="100%" stop-color="#1E2236" />
    </linearGradient>
  </defs>

  <path class="s-path" d="M 140 40 C 140 0, 20 0, 20 50 C 20 100, 140 100, 140 150 C 140 200, 20 200, 20 160" fill="none" stroke="url(#grad1-logo)" stroke-width="14" stroke-linecap="round" />
  <path class="s-path" d="M 115 50 C 115 20, 45 20, 45 60 C 45 100, 115 100, 115 140 C 115 180, 45 180, 45 150" fill="none" stroke="url(#grad2-logo)" stroke-width="14" stroke-linecap="round" />
  <path class="s-path" d="M 90 60 C 90 40, 70 40, 70 70 C 70 100, 90 100, 90 130 C 90 160, 70 160, 70 140" fill="none" stroke="url(#grad3-logo)" stroke-width="14" stroke-linecap="round" />

  <g class="central-core">
      <circle cx="80" cy="100" r="14" fill="none" stroke="#38BDF8" class="central-pulse" />
      <circle cx="80" cy="100" r="10" fill="#ffffff" filter="url(#glow-logo)" />
      <circle cx="80" cy="100" r="4.5" fill="#4F8EF7" />
  </g>
</svg>
